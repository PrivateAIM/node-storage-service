# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
        args: [ --unsafe ]
        exclude: ^k8s/helm/node-result-service/
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [ --markdown-linebreak-ext=md ]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.1
    hooks:
      - id: ruff-check
        args: [ --fix ]
      - id: ruff-format
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [ commit-msg ]
        args: [ ]
  - repo: local
    hooks:
      - id: spectral
        name: Spectral via Docker
        entry: spectral/spectral.sh
        language: unsupported_script
        args: [ --fail-severity=warn ]
        pass_filenames: false
        always_run: true
      - id: pytest
        name: pytest
        entry: pytest tests --cov-fail-under=85
        language: system
        always_run: true
        pass_filenames: false
        stages: [ pre-push ]
      # Note that this hook fails if the README is updated by it. Push again with the updated README.
      - id: readme-coverage-badger
        name: readme-coverage-badger
        entry: readme-cov
        language: system
        always_run: true
        pass_filenames: false
        stages: [ pre-push ]
