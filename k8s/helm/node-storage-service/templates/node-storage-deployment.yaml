apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}-node-storage-deployment"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{ .Release.Name }}-node-storage"
  template:
    metadata:
      labels:
        app: "{{ .Release.Name }}-node-storage"
    spec:
      containers:
        - name: "{{ .Release.Name }}-node-storage-service"
          image: ghcr.io/privateaim/node-storage-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http-storage
          env:
            - name: S3__ENDPOINT
              value: "{{ .Release.Name }}-local-seaweedfs-service"
            - name: S3__ACCESS_KEY
              value: {{ required "S3 user must be set." .Values.env.S3_ACCESS_KEY | quote }}
            - name: S3__SECRET_KEY
              value: {{ required "S3 password must be set." .Values.env.S3_SECRET_KEY | quote }}
            - name: S3__USE_SSL
              value: {{ .Values.env.S3_USE_SSL | default false | quote }}
            - name: S3__BUCKET
              value: {{ required "S3 bucket must be set." .Values.env.S3_BUCKET | quote }}
            - name: HUB__AUTH_USERNAME
              value: {{ required "Hub username must be set." .Values.env.HUB_USERNAME | quote }}
            - name: HUB__AUTH_PASSWORD
              value: {{ required "Hub password must be set." .Values.env.HUB_PASSWORD | quote }}
            - name: OIDC__CERTS_URL
              value: {{ required "OIDC endpoint must be set." .Values.env.OIDC_CERTS_URL | quote }}
            # Change this to "1" for testing purposes. This will cause the value of OIDC__CERTS_URL to be
            # ignored. You will still need to set this variable for the service to start up correctly.
            - name: OIDC__SKIP_JWT_VALIDATION
              value: "0"
          startupProbe:
            httpGet:
              path: /healthz
              port: http-storage
            failureThreshold: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http-storage
            failureThreshold: 3
            periodSeconds: 10
