apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}-local-seaweedfs-deployment"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{ .Release.Name }}-seaweedfs"
  template:
    metadata:
      labels:
        app: "{{ .Release.Name }}-seaweedfs"
    spec:
      containers:
        - name: "{{ .Release.Name }}-local-seaweedfs"
          image: chrislusf/seaweedfs:4.39
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8333
              name: http-s3
          env:
            - name: AWS_ACCESS_KEY_ID
              value: {{ required "S3 user must be set." .Values.env.S3_ACCESS_KEY | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ required "S3 password must be set." .Values.env.S3_SECRET_KEY | quote }}
            - name: S3_BUCKET
              value: {{ required "S3 bucket must be set." .Values.env.S3_BUCKET | quote }}
