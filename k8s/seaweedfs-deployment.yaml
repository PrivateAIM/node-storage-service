apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-seaweedfs-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs
  template:
    metadata:
      labels:
        app: seaweedfs
    spec:
      containers:
        - name: local-seaweedfs
          image: chrislusf/seaweedfs:4.39
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8333
              name: http-s3
          env:
            - name: AWS_ACCESS_KEY_ID
              value: admin
            - name: AWS_SECRET_ACCESS_KEY
              value: s3cr3t_p4ssw0rd
            - name: S3_BUCKET
              value: flame
