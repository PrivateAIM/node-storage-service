name: Create and publish Docker image from dev branch

on:
  workflow_dispatch:
  pull_request:
    types: [ "closed" ]
    branches:
      - develop
  push:
    branches:
      - develop

jobs:
  build-and-push-image:
    if: github.event_name == 'push' || github.event.pull_request.merged || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Create and publish Docker image from dev branch
        uses: ./.github/actions/build-push-docker-image
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          extra_tag: "edge"
